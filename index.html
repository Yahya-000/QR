<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء QR</title>
    <link rel="stylesheet" href="styli.css">
</head>
<body>
    <div class="container">
        <p>أدخل نص أو رابط </p>
        <input type="text" placeholder="نص او رابط" id="qrText">


        <div id="imgBox">
            <img src="" id="qrImage">
        </div>

        <button onclick="generateQRcode()">أنشئ الباركود</button>
        <button id="saveBtn" onclick="downloadQR()">حفظ</button>
    </div>
    <script>
        let imgBox = document.getElementById("imgBox");
        let qrimage = document.getElementById("qrImage");
        let qrText = document.getElementById("qrText");
        let saveBtn = document.getElementById("saveBtn");

        function generateQRcode(){
            if(qrText.value.length > 0){
                qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + qrText.value;

                qrImage.onload = function(){
                    saveBtn.style.display = "block";
                    imgBox.classList.add("show-img");
                };
           
                
            }else{
                qrText.classList.add("error");
                    setTimeout(() => {
                        qrText.classList.remove("error");
                    }, 1000);
            }
        }

            function downloadQR() {
    const img = document.getElementById("qrImage");
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    // تأكد من أن الصورة تم تحميلها ولها أبعاد
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;

    const tempImg = new Image();
    
    // تصحيح: كانت tenpImg بالخطأ
    tempImg.crossOrigin = "anonymous"; 
    tempImg.src = img.src;

    tempImg.onload = function() {
        // تصحيح: كانت trmpImg بالخطأ
        ctx.drawImage(tempImg, 0, 0); 
        
        const link = document.createElement('a');
        link.download = "QR-code.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    };
}
    </script>
</body>
</html>
